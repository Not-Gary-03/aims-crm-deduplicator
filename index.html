<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duplicate Report Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #252a38;
      --accent: #4f8ef7;
      --accent2: #f7c948;
      --text: #e2e8f0;
      --muted: #6b7a99;
      --danger: #f76f6f;
      --success: #4fd1a5;
      --row-hover: #1e2436;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    header span {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    /* Report date picker */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .date-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .date-select:hover, .date-select:focus {
      border-color: var(--accent);
    }

    .status-badge {
      margin-left: auto;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .status-badge.loaded { color: var(--success); border-color: var(--success); }
    .status-badge.loading { color: var(--accent2); border-color: var(--accent2); }
    .status-badge.error { color: var(--danger); border-color: var(--danger); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 10px 20px;
      font-size: 0.85rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-count {
      display: inline-block;
      background: var(--border);
      color: var(--muted);
      font-size: 0.7rem;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 8px;
    }

    .tab.active .tab-count {
      background: var(--accent);
      color: #fff;
    }

    /* Search */
    .search-bar {
      margin-bottom: 16px;
    }

    .search-bar input {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.875rem;
      padding: 9px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus { border-color: var(--accent); }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    thead {
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th {
      padding: 11px 14px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--text); }
    th.sort-asc::after { content: ' ↑'; color: var(--accent); }
    th.sort-desc::after { content: ' ↓'; color: var(--accent); }

    td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--row-hover); }

    .confidence-high { color: var(--success); font-family: 'IBM Plex Mono', monospace; }
    .confidence-med { color: var(--accent2); font-family: 'IBM Plex Mono', monospace; }
    .confidence-low { color: var(--danger); font-family: 'IBM Plex Mono', monospace; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-family: 'IBM Plex Mono', monospace;
      background: var(--border);
      color: var(--muted);
    }

    .pill.email-phone { background: #1a2a4a; color: #7ab3f7; }
    .pill.email { background: #1a2d2a; color: #4fd1a5; }
    .pill.phone { background: #2d2a1a; color: #f7c948; }
    .pill.same-lead { background: #2a1a2d; color: #c47af7; }
    .pill.same-contact { background: #2d1a1a; color: #f77a7a; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
    }

    .empty-state .icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

    .summary-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      min-width: 120px;
    }

    .stat-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }

    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      transition: border-color 0.15s;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-btn.active { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>// DUPLICATE REPORT VIEWER</h1>
  <span id="last-updated">—</span>
</header>

<div class="container">

  <div class="controls">
    <label>REPORT DATE</label>
    <select class="date-select" id="date-picker">
      <option value="">Loading reports...</option>
    </select>
    <span class="status-badge" id="status-badge">idle</span>
  </div>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="tabs">
    <div class="tab active" data-tab="leads" onclick="switchTab('leads')">
      Lead Duplicates <span class="tab-count" id="count-leads">0</span>
    </div>
    <div class="tab" data-tab="meetings" onclick="switchTab('meetings')">
      Meeting Duplicates <span class="tab-count" id="count-meetings">0</span>
    </div>
  </div>

  <!-- Lead Duplicates Panel -->
  <div class="panel active" id="panel-leads">
    <div class="search-bar">
      <input type="text" id="search-leads" placeholder="Search leads..." oninput="filterTable('leads')" />
    </div>
    <div class="table-wrap">
      <table id="table-leads">
        <thead id="thead-leads"></thead>
        <tbody id="tbody-leads"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination-leads"></div>
  </div>

  <!-- Meeting Duplicates Panel -->
  <div class="panel" id="panel-meetings">
    <div class="search-bar">
      <input type="text" id="search-meetings" placeholder="Search meetings..." oninput="filterTable('meetings')" />
    </div>
    <div class="table-wrap">
      <table id="table-meetings">
        <thead id="thead-meetings"></thead>
        <tbody id="tbody-meetings"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination-meetings"></div>
  </div>

</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  const GITHUB_USER = 'Not-Gary-03';
  const GITHUB_REPO = 'aims-crm-deduplicator';
  const OUTPUTS_FOLDER = 'reports';

  const PAGE_SIZE = 50;

  // ── STATE ───────────────────────────────────────────────────────────────────
  let state = {
    dates: [],
    leads: { all: [], filtered: [], page: 1, sortCol: null, sortDir: 1 },
    meetings: { all: [], filtered: [], page: 1, sortCol: null, sortDir: 1 },
    activeTab: 'leads'
  };

  // ── INIT ────────────────────────────────────────────────────────────────────
  async function init() {
    setStatus('loading', 'fetching...');
    try {
      const files = await fetchFileList();
      populateDatePicker(files);
      const latest = document.getElementById('date-picker').value;
      if (latest) await loadReport(latest);
    } catch(e) {
      setStatus('error', 'error');
      showEmpty('leads', 'Could not load report list.');
      showEmpty('meetings', 'Could not load report list.');
    }
  }

  // ── GITHUB API ───────────────────────────────────────────────────────────────
  async function fetchFileList() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${OUTPUTS_FOLDER}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Could not fetch file list');
    const files = await res.json();
    return files.filter(f => f.name.endsWith('.csv'));
  }

  async function fetchCSV(path) {
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${path}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Could not fetch CSV');
    return res.text();
  }

  // ── DATE PICKER ──────────────────────────────────────────────────────────────
  function populateDatePicker(files) {
    // Extract unique dates from filenames like 2026-04-25_duplicate_report.csv
    const dateMap = {};
    files.forEach(f => {
      const m = f.name.match(/^(\d{4}-\d{2}-\d{2})_/);
      if (m) {
        if (!dateMap[m[1]]) dateMap[m[1]] = [];
        dateMap[m[1]].push(f);
      }
    });

    state.dates = Object.keys(dateMap).sort().reverse();
    state.filesByDate = dateMap;

    const picker = document.getElementById('date-picker');
    picker.innerHTML = state.dates.map(d =>
      `<option value="${d}">${formatDate(d)}</option>`
    ).join('');

    picker.onchange = () => loadReport(picker.value);
  }

  // ── LOAD REPORT ──────────────────────────────────────────────────────────────
  async function loadReport(date) {
    setStatus('loading', 'loading...');
    document.getElementById('last-updated').textContent = `report: ${date}`;

    const files = state.filesByDate[date] || [];
    const leadFile = files.find(f => f.name.includes('duplicate_report') && !f.name.includes('meeting'));
    const meetingFile = files.find(f => f.name.includes('meeting_dupe'));

    try {
      if (leadFile) {
        const csv = await fetchCSV(leadFile.path);
        const rows = parseCSV(csv);
        state.leads.all = rows;
        state.leads.filtered = rows;
        state.leads.page = 1;
        renderTable('leads');
      } else {
        showEmpty('leads', `No lead duplicate report for ${date}`);
      }

      if (meetingFile) {
        const csv = await fetchCSV(meetingFile.path);
        const rows = parseCSV(csv);
        state.meetings.all = rows;
        state.meetings.filtered = rows;
        state.meetings.page = 1;
        renderTable('meetings');
      } else {
        showEmpty('meetings', `No meeting duplicate report for ${date}`);
      }

      updateSummary();
      setStatus('loaded', 'loaded');
    } catch(e) {
      setStatus('error', 'error');
    }
  }

  // ── CSV PARSER ───────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const headers = lines[0].split(',');
    return lines.slice(1).map(line => {
      const vals = splitCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
      return obj;
    });
  }

  function splitCSVLine(line) {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuote = !inQuote; }
      else if (c === ',' && !inQuote) { result.push(cur); cur = ''; }
      else { cur += c; }
    }
    result.push(cur);
    return result;
  }

  // ── RENDER TABLE ─────────────────────────────────────────────────────────────
  function renderTable(type) {
    const s = state[type];
    const tbody = document.getElementById(`tbody-${type}`);
    const thead = document.getElementById(`thead-${type}`);

    if (!s.all.length) { showEmpty(type, 'No data.'); return; }

    const headers = Object.keys(s.all[0]);

    // Header
    thead.innerHTML = '<tr>' + headers.map((h, i) =>
      `<th onclick="sortTable('${type}', ${i})" class="${s.sortCol === i ? (s.sortDir === 1 ? 'sort-asc' : 'sort-desc') : ''}">${h}</th>`
    ).join('') + '</tr>';

    // Paginate
    const start = (s.page - 1) * PAGE_SIZE;
    const pageRows = s.filtered.slice(start, start + PAGE_SIZE);

    tbody.innerHTML = pageRows.map(row =>
      '<tr>' + headers.map(h => `<td title="${esc(row[h])}">${formatCell(h, row[h])}</td>`).join('') + '</tr>'
    ).join('');

    // Count badges
    document.getElementById(`count-${type}`).textContent = s.filtered.length;

    renderPagination(type);
  }

  function formatCell(key, val) {
    if (!val) return `<span style="color:var(--muted)">—</span>`;
    if (key === 'confidence') {
      const n = parseFloat(val);
      const cls = n >= 0.9 ? 'confidence-high' : n >= 0.7 ? 'confidence-med' : 'confidence-low';
      return `<span class="${cls}">${(n * 100).toFixed(0)}%</span>`;
    }
    if (key === 'matched_signals' || key === 'duplicate_type') {
      const slug = val.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      return `<span class="pill ${slug}">${esc(val)}</span>`;
    }
    return esc(val);
  }

  function esc(v) {
    return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SORT ─────────────────────────────────────────────────────────────────────
  function sortTable(type, colIdx) {
    const s = state[type];
    const headers = Object.keys(s.all[0]);
    const key = headers[colIdx];
    if (s.sortCol === colIdx) { s.sortDir *= -1; } else { s.sortCol = colIdx; s.sortDir = 1; }
    s.filtered.sort((a, b) => {
      const av = a[key] || '', bv = b[key] || '';
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * s.sortDir;
      return av.localeCompare(bv) * s.sortDir;
    });
    s.page = 1;
    renderTable(type);
  }

  // ── FILTER ───────────────────────────────────────────────────────────────────
  function filterTable(type) {
    const q = document.getElementById(`search-${type}`).value.toLowerCase();
    const s = state[type];
    s.filtered = s.all.filter(row =>
      Object.values(row).some(v => v.toLowerCase().includes(q))
    );
    s.page = 1;
    renderTable(type);
  }

  // ── PAGINATION ───────────────────────────────────────────────────────────────
  function renderPagination(type) {
    const s = state[type];
    const total = Math.ceil(s.filtered.length / PAGE_SIZE);
    const el = document.getElementById(`pagination-${type}`);
    if (total <= 1) { el.innerHTML = ''; return; }

    let html = `<span>${s.filtered.length} rows</span>`;
    html += `<button class="page-btn" onclick="goPage('${type}', ${s.page - 1})" ${s.page === 1 ? 'disabled' : ''}>←</button>`;
    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - s.page) <= 2) {
        html += `<button class="page-btn ${i === s.page ? 'active' : ''}" onclick="goPage('${type}', ${i})">${i}</button>`;
      } else if (Math.abs(i - s.page) === 3) {
        html += `<span>…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage('${type}', ${s.page + 1})" ${s.page === total ? 'disabled' : ''}>→</button>`;
    el.innerHTML = html;
  }

  function goPage(type, page) {
    state[type].page = page;
    renderTable(type);
  }

  // ── TABS ─────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    state.activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
  }

  // ── SUMMARY ──────────────────────────────────────────────────────────────────
  function updateSummary() {
    const lCount = state.leads.all.length;
    const mCount = state.meetings.all.length;
    const highConf = state.leads.all.filter(r => parseFloat(r.confidence) >= 0.9).length;

    document.getElementById('summary-bar').innerHTML = `
      <div class="stat"><div class="stat-val">${lCount}</div><div class="stat-label">Lead Dupes</div></div>
      <div class="stat"><div class="stat-val">${mCount}</div><div class="stat-label">Meeting Dupes</div></div>
      <div class="stat"><div class="stat-val">${highConf}</div><div class="stat-label">High Confidence</div></div>
    `;
  }

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  function setStatus(type, text) {
    const el = document.getElementById('status-badge');
    el.className = `status-badge ${type}`;
    el.textContent = text;
  }

  function showEmpty(type, msg) {
    document.getElementById(`tbody-${type}`).innerHTML =
      `<tr><td colspan="20"><div class="empty-state"><div class="icon">◫</div>${msg}</div></td></tr>`;
    document.getElementById(`count-${type}`).textContent = '0';
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
  }

  init();
</script>
</body>
</html>
